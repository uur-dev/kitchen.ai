# =================================================================
# Kitchen-AI — DEVELOPMENT
# All ports exposed for local debugging
# Run: docker compose up --build
# =================================================================

services:

  # ═══════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════

  postgres-db:
    image: postgres:16
    container_name: postgres-db
    restart: unless-stopped
    networks:
      - dev-network
    ports:
      - "5432:5432"             # exposed — connect via DBeaver/TablePlus
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin-web:
    image: dpage/pgadmin4
    container_name: pgadmin-web
    restart: unless-stopped
    networks:
      - dev-network
    ports:
      - "5050:80"               # exposed — http://localhost:5050
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres-db:
        condition: service_healthy

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    networks:
      - dev-network
    ports:
      - "27017:27017"           # exposed — connect via Compass
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: unless-stopped
    networks:
      - dev-network
    ports:
      - "8082:8081"             # exposed — http://localhost:8082
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    depends_on:
      mongodb:
        condition: service_healthy

  redis-server:
    image: redis:7-alpine
    container_name: redis-server
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - dev-network
    ports:
      - "6379:6379"             # exposed — connect via Redis Insight
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: unless-stopped
    user: root
    networks:
      - dev-network
    ports:
      - "8001:5540"             # exposed — http://localhost:8001
    volumes:
      - redis-insight-data:/data
    depends_on:
      redis-server:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    networks:
      - dev-network
    ports:
      - "5672:5672"             # exposed — AMQP port
      - "15672:15672"           # exposed — http://localhost:15672 management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # SPRING BOOT SERVICES
  # ═══════════════════════════════════════════════════════════════

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: config-server
    container_name: config-server
    restart: unless-stopped
    networks:
      - dev-network
    ports:
      - "8888:8888"             # exposed — check configs at http://localhost:8888
    environment:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      FIREBASE_STORAGE_FOLDER: ${FIREBASE_STORAGE_FOLDER}
      JWT_SECRET: ${JWT_SECRET}
      ANDROID_APP_ID: ${ANDROID_APP_ID}
      ANDROID_APP_SECRET: ${ANDROID_APP_SECRET}
      IOS_APP_ID: ${IOS_APP_ID}
      IOS_APP_SECRET: ${IOS_APP_SECRET}
      WEB_APP_ID: ${WEB_APP_ID}
      WEB_APP_SECRET: ${WEB_APP_SECRET}
      DESKTOP_APP_ID: ${DESKTOP_APP_ID}
      DESKTOP_APP_SECRET: ${DESKTOP_APP_SECRET}
      MACOS_APP_ID: ${MACOS_APP_ID}
      MACOS_APP_SECRET: ${MACOS_APP_SECRET}
      REDIS_HOST: redis-server
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      GITHUB_CONFIG_URL: ${GITHUB_CONFIG_URL}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      GITHUB_SECRET: ${GITHUB_SECRET}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: eureka-server
    container_name: eureka-discovery-server
    restart: unless-stopped
    networks:
      - dev-network
    ports:
      - "8761:8761"             # exposed — http://localhost:8761 dashboard
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: api-gateway
    container_name: api-gateway
    restart: unless-stopped
    networks:
      - dev-network
    ports:
      - "8080:8080"             # public entry point — http://localhost:8080
    environment:
      JWT_SECRET: ${JWT_SECRET}
      MAX_SIGNATURE_AGE_SECONDS: ${MAX_SIGNATURE_AGE_SECONDS}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      REDIS_HOST: redis-server
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-discovery-server:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: auth-service
    container_name: auth-service
    restart: unless-stopped
    networks:
      - dev-network
    # no ports — internal only
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MAX_SIGNATURE_AGE_SECONDS: ${MAX_SIGNATURE_AGE_SECONDS}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis-server
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      redis-server:
        condition: service_healthy

  recipe-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: recipe-service
    container_name: recipe-service
    restart: unless-stopped
    networks:
      - dev-network
    # no ports — internal only
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      RECIPE_DB_NAME: ${RECIPE_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      redis-server:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: ai-service
    container_name: ai-service
    restart: unless-stopped
    networks:
      - dev-network
    # no ports — internal only
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: notification-service
    container_name: notification-service
    restart: unless-stopped
    networks:
      - dev-network
    # no ports — internal only
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      FIREBASE_STORAGE_FOLDER: ${FIREBASE_STORAGE_FOLDER}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  storage-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: storage-service
    container_name: storage-service
    restart: unless-stopped
    networks:
      - dev-network
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      FIREBASE_STORAGE_FOLDER: ${FIREBASE_STORAGE_FOLDER}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-discovery-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  postgres-data:
  pgadmin-data:
  mongo-data:
  redis-data:
  redis-insight-data:
  rabbitmq-data:

networks:
  dev-network:
    external: true