# =================================================================
# Kitchen-AI — PRODUCTION
# Only the API Gateway is exposed to the host.
# All other services are internal to prod-network.
# Run: docker compose -f docker-compose.prod.yml up -d
# =================================================================

services:

  # ═══════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════

  postgres-db:
    image: postgres:16
    container_name: postgres-db
    restart: always
    networks:
      - prod-network
    # no ports — internal only
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    networks:
      - prod-network
    # no ports — internal only
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-server:
    image: redis:7-alpine
    container_name: redis-server
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - prod-network
    # no ports — internal only
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    networks:
      - prod-network
    # no ports — internal only
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # SPRING BOOT SERVICES
  # ═══════════════════════════════════════════════════════════════

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: config-server
    container_name: config-server
    restart: always
    networks:
      - prod-network
    # no ports — internal only
    environment:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      FIREBASE_STORAGE_FOLDER: ${FIREBASE_STORAGE_FOLDER}
      JWT_SECRET: ${JWT_SECRET}
      ANDROID_APP_ID: ${ANDROID_APP_ID}
      ANDROID_APP_SECRET: ${ANDROID_APP_SECRET}
      IOS_APP_ID: ${IOS_APP_ID}
      IOS_APP_SECRET: ${IOS_APP_SECRET}
      WEB_APP_ID: ${WEB_APP_ID}
      WEB_APP_SECRET: ${WEB_APP_SECRET}
      DESKTOP_APP_ID: ${DESKTOP_APP_ID}
      DESKTOP_APP_SECRET: ${DESKTOP_APP_SECRET}
      MACOS_APP_ID: ${MACOS_APP_ID}
      MACOS_APP_SECRET: ${MACOS_APP_SECRET}
      REDIS_HOST: redis-server
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      GITHUB_CONFIG_URL: ${GITHUB_CONFIG_URL}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      GITHUB_SECRET: ${GITHUB_SECRET}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: eureka-server
    container_name: eureka-discovery-server
    restart: always
    networks:
      - prod-network
    # no ports — internal only
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: api-gateway
    container_name: api-gateway
    restart: always
    networks:
      - prod-network
    ports:
      - "8080:8080"             # ← sole public entry point
    environment:
      JWT_SECRET: ${JWT_SECRET}
      MAX_SIGNATURE_AGE_SECONDS: ${MAX_SIGNATURE_AGE_SECONDS}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      REDIS_HOST: redis-server
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-discovery-server:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: auth-service
    container_name: auth-service
    restart: always
    networks:
      - prod-network
    # no ports — internal only
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MAX_SIGNATURE_AGE_SECONDS: ${MAX_SIGNATURE_AGE_SECONDS}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis-server
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      redis-server:
        condition: service_healthy

  recipe-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: recipe-service
    container_name: recipe-service
    restart: always
    networks:
      - prod-network
    # no ports — internal only
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      RECIPE_DB_NAME: ${RECIPE_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      redis-server:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: ai-service
    container_name: ai-service
    restart: always
    networks:
      - prod-network
    # no ports — internal only
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: notification-service
    container_name: notification-service
    restart: always
    networks:
      - prod-network
    # no ports — internal only
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      FIREBASE_STORAGE_FOLDER: ${FIREBASE_STORAGE_FOLDER}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  storage-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: storage-service
    container_name: storage-service
    restart: always
    networks:
      - prod-network
    # no ports — internal only
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
      FIREBASE_STORAGE_FOLDER: ${FIREBASE_STORAGE_FOLDER}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-discovery-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  rabbitmq-data:

networks:
  prod-network:
    driver: bridge