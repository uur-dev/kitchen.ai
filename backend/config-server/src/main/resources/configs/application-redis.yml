# redis configs
spring:
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: false
      connect-timeout: 5000
      timeout: 2000
      lettuce:
        pool:
          min-idle: 2
          max-idle: 8
          max-active: 16
          max-wait: -1