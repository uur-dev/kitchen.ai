server:
  port: 0

spring:
  application:
    name: ai-service
  profiles:
    active: rabbitmq
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}

        chat:
          options:
            model: gemini-2.5-flash-lite

            # Low temperature = more consistent / valid JSON output
            temperature: 0.3

            # Gemini supports JSON response MIME type — enforce it
            response-mime-type: application/json

            # Max output tokens (increase for very complex recipes)
            max-output-tokens: 2048

  mongodb:
    uri: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/ai-kitechen-ai?authSource=admin