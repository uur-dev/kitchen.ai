server:
  port: 0

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false

logging:
  level:
    org.flywaydb: DEBUG

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

app:
  platforms:
    android:
      app-id: ${ANDROID_APP_ID}
      secret: ${ANDROID_APP_SECRET}

    ios:
      app-id: ${IOS_APP_ID}
      secret: ${IOS_APP_SECRET}

    web:
      app-id: ${WEB_APP_ID}
      secret: ${WEB_APP_SECRET}

    desktop:
      app-id: ${DESKTOP_APP_ID}
      secret: ${DESKTOP_APP_SECRET}

    macOS:
      app-id: ${MACOS_APP_ID}
      secret: ${MACOS_APP_SECRET}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: 300000
  refresh-token-expiry-ms: 2592000000